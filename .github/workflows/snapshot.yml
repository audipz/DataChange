name: Snapshot Deploy

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and test
        run: ./mvnw -B clean verify

