name: Build

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and test
        run: ./mvnw -B clean verify

