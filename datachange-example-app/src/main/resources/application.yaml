spring:
  datasource:
    url: jdbc:h2:mem:datachange;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        envers:
          autoRegisterListeners: true
    show-sql: false

datachange:
  enabled: true
  mode: STARTUP
  locations:
    - classpath*:datachange/*.json

